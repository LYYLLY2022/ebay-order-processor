<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eBay 订单处理系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .header p {
            opacity: 0.9;
            font-size: 14px;
        }

        .content {
            padding: 30px;
        }

        .section {
            margin-bottom: 30px;
        }

        .section-title {
            font-size: 18px;
            font-weight: 600;
            color: #333;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-title::before {
            content: '';
            width: 4px;
            height: 20px;
            background: #667eea;
            border-radius: 2px;
        }

        .upload-area {
            border: 3px dashed #ddd;
            border-radius: 8px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #fafafa;
        }

        .upload-area:hover,
        .upload-area.dragover {
            border-color: #667eea;
            background: #f0f4ff;
        }

        .upload-icon {
            font-size: 48px;
            color: #667eea;
            margin-bottom: 15px;
        }

        .upload-text {
            color: #666;
            margin-bottom: 10px;
        }

        .upload-hint {
            color: #999;
            font-size: 13px;
        }

        .file-input {
            display: none;
        }

        .settings-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }

        .setting-item {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .setting-item label {
            font-size: 14px;
            color: #555;
            font-weight: 500;
        }

        .setting-item input {
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            transition: border-color 0.3s ease;
        }

        .setting-item input:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-success {
            background: #28a745;
            color: white;
        }

        .btn-success:hover {
            background: #218838;
            transform: translateY(-2px);
        }

        .file-list {
            margin-top: 15px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            overflow: hidden;
        }

        .file-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 15px;
            border-bottom: 1px solid #e0e0e0;
            background: white;
        }

        .file-item:last-child {
            border-bottom: none;
        }

        .file-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .file-icon {
            font-size: 20px;
        }

        .file-name {
            font-size: 14px;
            color: #333;
        }

        .file-size {
            font-size: 12px;
            color: #999;
        }

        .file-status {
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
        }

        .file-status.success {
            background: #d4edda;
            color: #155724;
        }

        .file-status.error {
            background: #f8d7da;
            color: #721c24;
        }

        .file-status.pending {
            background: #fff3cd;
            color: #856404;
        }

        .progress-area {
            margin-top: 20px;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #e0e0e0;
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 10px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            border-radius: 4px;
            transition: width 0.3s ease;
            width: 0%;
        }

        .progress-text {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            color: #666;
        }

        .result-area {
            margin-top: 20px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 20px;
            background: #fafafa;
        }

        .result-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .stat-value {
            font-size: 28px;
            font-weight: 700;
            color: #667eea;
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 13px;
            color: #666;
        }

        .message {
            padding: 12px 20px;
            border-radius: 6px;
            margin-top: 15px;
            font-size: 14px;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .message.info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }

        .hidden {
            display: none;
        }

        .actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>eBay 订单处理系统</h1>
            <p>自动化处理 eBay 导出的 XML 订单报告</p>
        </div>

        <div class="content">
            <div class="section">
                <div class="section-title">第一步：文件上传</div>
                <div class="upload-area" id="uploadArea">
                    <div class="upload-icon">📁</div>
                    <div class="upload-text">拖拽 XML 文件到此处或点击上传</div>
                    <div class="upload-hint">支持多个 .xml 文件，系统会自动去重和校验</div>
                    <input type="file" class="file-input" id="fileInput" multiple accept=".xml">
                </div>
                <div class="file-list" id="fileList"></div>
            </div>

            <div class="section">
                <div class="section-title">第二步：汇率设置</div>
                <div class="settings-grid">
                    <div class="setting-item">
                        <label>GBP 汇率 (英镑 → USD)</label>
                        <input type="number" id="gbpRate" value="1.33" step="0.01" min="0">
                    </div>
                    <div class="setting-item">
                        <label>USD 汇率 (美元 → USD)</label>
                        <input type="number" id="usdRate" value="1.00" step="0.01" min="0">
                    </div>
                    <div class="setting-item">
                        <label>AUD 汇率 (澳元 → USD)</label>
                        <input type="number" id="audRate" value="0.70" step="0.01" min="0">
                    </div>
                    <div class="setting-item">
                        <label>EUR 汇率 (欧元 → USD)</label>
                        <input type="number" id="eurRate" value="1.15" step="0.01" min="0">
                    </div>
                </div>
            </div>

            <div class="section">
                <div class="section-title">第三步：开始处理</div>
                <div class="actions">
                    <button class="btn btn-primary" id="processBtn">开始处理</button>
                </div>
                <div class="progress-area hidden" id="progressArea">
                    <div class="progress-bar">
                        <div class="progress-fill" id="progressFill"></div>
                    </div>
                    <div class="progress-text">
                        <span id="progressStatus">准备中...</span>
                        <span id="progressPercent">0%</span>
                    </div>
                </div>
            </div>

            <div class="section hidden" id="resultSection">
                <div class="section-title">处理结果</div>
                <div class="result-stats">
                    <div class="stat-card">
                        <div class="stat-value" id="statFiles">0</div>
                        <div class="stat-label">处理文件数</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="statRows">0</div>
                        <div class="stat-label">总数据行数</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="statGroups">0</div>
                        <div class="stat-label">分组记录数</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="statFiltered">0</div>
                        <div class="stat-label">过滤行数</div>
                    </div>
                </div>
                <div class="actions">
                    <button class="btn btn-success" id="exportBtn">导出 Excel 报表</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
